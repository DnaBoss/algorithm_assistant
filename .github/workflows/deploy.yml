name: deploy

on:
  workflow_dispatch:
  # Uncomment below to deploy every push to develop.
  # push:
  #   branches:
  #     - develop
  # pull_request:
  #   branches:
  #     - develop

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: ${{ vars.NODE_VERSION || '22' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: algorithm-assistant-dist
          path: dist/
          if-no-files-found: error

  cd:
    needs: [ci]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: algorithm-assistant-dist
          path: dist/

      - name: Install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GH_ACTION_SSH_PRIVATE_KEY }}
          BASTION_HOST: ${{ secrets.BASTION_HOST }}
          BASTION_USER: ${{ secrets.BASTION_USER }}
          ESSENCE_HOST: ${{ secrets.ESSENCE_HOST }}
          ESSENCE_USER: ${{ secrets.ESSENCE_USER }}
        run: |
          set -euo pipefail

          test -n "${SSH_PRIVATE_KEY}"
          test -n "${BASTION_HOST}"
          test -n "${BASTION_USER}"
          test -n "${ESSENCE_HOST}"
          test -n "${ESSENCE_USER}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

          cat > "$HOME/.ssh/config" <<EOF
          Host bastion
            HostName ${BASTION_HOST}
            User ${BASTION_USER}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new

          Host essence
            HostName ${ESSENCE_HOST}
            User ${ESSENCE_USER}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            ProxyJump bastion
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Show SSH deploy key fingerprint
        run: |
          set -euo pipefail
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > "$HOME/.ssh/deploy_key.pub"
          ssh-keygen -lf "$HOME/.ssh/deploy_key.pub"

      - name: Verify SSH route
        run: |
          set -euo pipefail
          ssh -vvv bastion 'echo "bastion ok: $(hostname)"' 2>ssh-bastion-debug.log || {
            grep -E 'Authenticating|Offering public key|Server accepts key|Permission denied|Authentications that can continue|No more authentication methods' ssh-bastion-debug.log || true
            exit 1
          }
          ssh essence 'echo "essence ok: $(hostname)"'

      - name: Deploy through bastion
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_PATH}" ]; then
            DEPLOY_PATH="$(ssh essence 'printf "%s" "$HOME/algorithm-assistant"')"
          fi

          RELEASE_PATH="${DEPLOY_PATH%/}/releases/${RELEASE_ID}"
          CURRENT_PATH="${DEPLOY_PATH%/}/current"

          ssh essence "mkdir -p '${RELEASE_PATH}'"
          rsync -az --delete -e ssh dist/ "essence:${RELEASE_PATH}/"
          ssh essence "ln -sfn '${RELEASE_PATH}' '${CURRENT_PATH}'"
          ssh essence "find '${DEPLOY_PATH%/}/releases' -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf"

      - name: Smoke test deployed files
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH}" ]; then
            DEPLOY_PATH="$(ssh essence 'printf "%s" "$HOME/algorithm-assistant"')"
          fi
          ssh essence "test -f '${DEPLOY_PATH%/}/current/index.html'"
